<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Animal Repository</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: #f4f4f4;
            margin: 0;
            padding: 2rem;
        }
        h1 {
            text-align: center;
            color: #333;
        }
        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 1.5rem;
            max-width: 1200px;
            margin: 0 auto;
        }
        .cards__item {
            background: white;
            border-radius: 8px;
            padding: 1.5rem;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.08);
        }
        .cards__item h2 {
            margin-top: 0;
            color: #2563eb;
            border-bottom: 1px solid #eee;
            padding-bottom: 0.5rem;
        }
        .cards__item ul {
            list-style: none;
            padding: 0;
        }
        .cards__item li {
            padding: 0.4rem 0;
        }
        .cards__item strong {
            color: #555;
        }
        .error {
            text-align: center;
            background: white;
            padding: 2rem;
            border-radius: 8px;
            max-width: 600px;
            margin: 2rem auto;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.08);
        }
    </style>
</head>
<body>
    <h1>My Animal Repository</h1>
    <div class="cards">
        __REPLACE_ANIMALS_INFO__
    </div>
</body>
</html>
